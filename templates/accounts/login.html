<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Luv Health</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    
    <style>
        body { background-color: #f8f9fa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .login-card { border-radius: 24px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .form-control { border-radius: 12px; padding: 12px 18px; background-color: #f8f9fa; border: 1px solid #eee; }
        .form-control:focus { background-color: #fff; border-color: #b91c1c; box-shadow: none; }
        .btn-login { background-color: #b91c1c; border: none; border-radius: 12px; padding: 12px; font-weight: 700; transition: 0.2s; }
        .btn-login:hover { background-color: #991b1b; transform: translateY(-2px); }
        .brand-text { font-family: Georgia, serif; color: #b91c1c; font-weight: 800; font-size: 2rem; }
    </style>
</head>

<body>

<div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="col-md-6 col-lg-4 animate__animated animate__fadeIn">
        <div class="text-center mb-4">
            <h1 class="brand-text">Luv Health</h1>
            <p class="text-muted">Clinical care, human centered.</p>
        </div>

        <div class="card login-card">
            <div class="card-body p-5">
                <h3 class="mb-4 fw-bold text-center" style="font-size: 1.25rem;">Sign In</h3>

                {% if form.errors %}
                    <div class="alert alert-danger small rounded-3 py-2 animate__animated animate__shakeX">
                        <i class="fa-solid fa-triangle-exclamation me-1"></i> Invalid username or password
                    </div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label small text-muted text-uppercase fw-bold">Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small text-muted text-uppercase fw-bold">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-login w-100">
                        Login to Dashboard
                    </button>
                    
                    <div class="mt-4 text-center">
                        <p class="small text-muted mb-0">Don't have an account? <a href="#" class="text-danger fw-bold text-decoration-none">Request Access</a></p>
                    </div>
                </form>
            </div>
        </div>
        
        <div class="mt-4 text-center small text-muted">
            &copy; 2026 Luv Health Inc. All rights reserved.
        </div>
    </div>
</div>

</body>
</html>
