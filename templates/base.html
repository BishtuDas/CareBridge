<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Luv Health</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>
<body>

<div class="d-flex">
    <div class="bg-light p-3" style="width: 250px; min-height: 100vh;">
        <h4>Menu</h4>

        {% if request.user.role == "parent" %}
            <a href="/dashboard/" class="d-block mb-2">Dashboard</a>
            <a href="/profile/" class="d-block mb-2">My Profile</a>
            <a href="/report/upload/" class="d-block mb-2">Upload Report</a>
            <a href="/children/" class="d-block mb-2">My Children</a>
            <a href="/chats/" class="d-block mb-2">Chats</a>
        {% elif request.user.role == "doctor" %}
            <a href="/dashboard/" class="d-block mb-2">Dashboard</a>
            <a href="/profile/" class="d-block mb-2">My Profile</a>
            <a href="/chats/" class="d-block mb-2">Patient Chats</a>
        {% endif %}

        <hr>
        <a href="/logout/" class="text-danger">Logout</a>
    </div>

    <div class="p-4 w-100">
        {% block content %}
        {% endblock %}
    </div>
</div>

</body>
</html>
